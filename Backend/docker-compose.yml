services:
  mysql:
    image: mysql:8.4
    container_name: jobpilot-ai-mysql
    environment:
      MYSQL_DATABASE: jobpilot_ai
      MYSQL_USER: jobpilot
      MYSQL_PASSWORD: jobpilot
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - jobpilot_ai_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: jobpilot-ai-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jobpilot_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: jobpilot
      SPRING_DATASOURCE_PASSWORD: jobpilot
    ports:
      - "8080:8080"

volumes:
  jobpilot_ai_mysql_data:
