spring:
  application:
    name: jobpilot-ai-backend

  profiles:
    active: dev

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  storage:
    resumes:
      dir: uploads/resumes

jobpilot:
  application:
    version: 0.0.1-SNAPSHOT

  security:
    jwt:
      secret: ${JWT_SECRET:jobpilot-ai-development-secret-key-change-before-production-0123456789}
      issuer: jobpilot-ai
      access-token-minutes: 15
      refresh-token-days: 14

  ai:
    gateway:
      primary-provider: GEMINI
      fallback-order:
        - OPENAI
        - CLAUDE
      fallback-enabled: true
      max-retries: 2

logging:
  level:
    root: INFO
    com.jobpilotai.backend: INFO