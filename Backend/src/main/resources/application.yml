spring:
  application:
    name: jobpilot-ai-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jobpilot:
  application:
    version: 0.0.1-SNAPSHOT
  security:
    jwt:
      secret: ${JWT_SECRET:jobpilot-ai-development-secret-key-change-before-production-0123456789}
      issuer: jobpilot-ai
      access-token-minutes: 15
      refresh-token-days: 14

logging:
  level:
    root: INFO
    com.jobpilotai.backend: INFO
