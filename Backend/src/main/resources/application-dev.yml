spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jobpilot_ai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.jdbc: DEBUG
    org.hibernate.SQL: DEBUG