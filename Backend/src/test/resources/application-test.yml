spring:
  datasource:
    url: jdbc:h2:mem:jobpilot_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

jobpilot:
  security:
    jwt:
      secret: test-secret-key-for-jobpilot-authentication-module-0123456789
      issuer: jobpilot-ai-test
      access-token-minutes: 15
      refresh-token-days: 14
